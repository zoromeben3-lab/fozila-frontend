<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fozila — Singles</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="fozila.css"/>
  <style>
    .singles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:18px; }
    .preview-banner {
      background: linear-gradient(135deg, var(--v-dim), rgba(76,29,149,0.08));
      border: 1px solid var(--v-border); border-radius: 14px;
      padding: 20px 24px; margin-bottom: 32px;
      display: flex; align-items: center; gap: 16px;
    }
    .now-playing { font-size: 13px; color: var(--v-light); font-weight: 600; }
    .now-playing span { color: var(--text); }
    @media(max-width:640px){ .singles-grid{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
  <div id="announce-bar"></div>
  <nav id="main-nav"></nav>

  <div class="section-wrap">
    <div class="section-label">Catalogue</div>
    <h1 class="section-title">Singles & Titres</h1>
    <p class="section-sub">Tous les titres disponibles à l'achat individuel</p>

    <!-- LECTEUR ACTIF -->
    <div class="preview-banner" id="now-playing-banner" style="display:none;">
      <div style="font-size:28px;" id="np-emoji">🎵</div>
      <div style="flex:1;">
        <div class="now-playing">▶ En cours : <span id="np-title">—</span></div>
        <div class="audio-player">
          <button class="play-btn" id="np-btn" onclick="toggleGlobalPlay()">⏸</button>
          <div class="player-bar">
            <div class="player-progress" onclick="seekAudio(event, this)">
              <div class="player-fill" id="np-fill"></div>
            </div>
            <div class="player-time"><span id="np-cur">0:00</span><span id="np-dur">0:30</span></div>
          </div>
          <span class="player-label">Extrait 30s</span>
        </div>
      </div>
      <button onclick="stopGlobal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;">✕</button>
    </div>

    <div class="singles-grid" id="singles-grid"></div>
  </div>

  <!-- MODAL ACHAT SINGLE -->
  <div class="modal-overlay hidden" id="buy-single-modal">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('buy-single-modal').classList.add('hidden')">✕</button>
      <h3 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;">Acheter ce single</h3>
      <p style="color:var(--muted);font-size:13px;margin-bottom:24px;" id="bsm-name"></p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;">
        <div class="pay-method selected" data-m="orange" onclick="selectPay(this)"><div style="font-size:22px;margin-bottom:4px;">🟠</div><div style="font-size:12px;">Orange Money</div></div>
        <div class="pay-method" data-m="moov" onclick="selectPay(this)"><div style="font-size:22px;margin-bottom:4px;">🔵</div><div style="font-size:12px;">Moov Money</div></div>
        <div class="pay-method" data-m="wave" onclick="selectPay(this)"><div style="font-size:22px;margin-bottom:4px;">💙</div><div style="font-size:12px;">Wave</div></div>
        <div class="pay-method" data-m="card" onclick="selectPay(this)"><div style="font-size:22px;margin-bottom:4px;">💳</div><div style="font-size:12px;">Carte bancaire</div></div>
      </div>
      <div class="form-group"><label>Numéro / Référence</label><input type="text" id="bsm-num" placeholder="ex: 07 00 00 00 00"/></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <span style="color:var(--muted);font-size:13px;">Total :</span>
        <span style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--v-light);" id="bsm-price"></span>
      </div>
      <button class="btn-primary" style="width:100%;margin-top:18px;padding:13px;" onclick="confirmSinglePayment()">Confirmer le paiement</button>
    </div>
  </div>

  <style>
    .pay-method{background:var(--card2);border:2px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:all 0.2s;font-size:12px;}
    .pay-method:hover,.pay-method.selected{border-color:var(--v);background:var(--v-dim);}
  </style>

  <script src="fozila.js"></script>
  <script>
    FOZILA.injectNav('singles');
    FOZILA.injectAnnounce();

    let currentSingleId = null;
    let globalAudio = null;
    let animFrame  = null;

    let allSingles = [];
    const _user = FOZILA.getUser();

    async function renderSingles() {
      allSingles = await FOZILA.getSingles();
      const grid = document.getElementById('singles-grid');

      const owned = _user
        ? await Promise.all(allSingles.map(s => FOZILA.hasPurchased(s.id, 'single')))
        : allSingles.map(() => false);

      grid.innerHTML = allSingles.map((s, i) => `
        <div class="single-card">
          <div class="single-cover" style="background:${s.grad}">
            ${s.cover_path ? `<img src="${s.cover_path}" style="width:100%;height:100%;object-fit:cover;">` : s.emoji}
            ${s.featured ? '<span class="featured-star">⭐</span>' : ''}
          </div>
          <div class="single-info">
            <div class="single-title">${s.title}</div>
            <div class="single-meta">${s.duration} · ${s.genre}</div>
            <div style="margin-bottom:10px;">
              <button onclick="previewSingle(${s.id})" style="background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all 0.2s;font-family:inherit;" onmouseover="this.style.borderColor='var(--v-light)';this.style.color='var(--v-light)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
                ▶ Extrait
              </button>
            </div>
            <div class="single-footer">
              <span style="font-size:14px;font-weight:700;color:var(--v-light);">${owned[i] ? '✓ Acheté' : FOZILA.fmt(s.price)}</span>
              ${owned[i]
                ? `<button onclick="downloadSingle(${s.id})" class="btn-buy">⬇️</button>`
                : `<button onclick="openBuySingle(${s.id})" class="btn-buy">Acheter</button>`
              }
            </div>
          </div>
        </div>`).join('');
    }

    async function downloadSingle(id) {
      const token = await FOZILA.getDownloadToken(id, 'single');
      FOZILA.download(token);
    }

    // Preview audio — vrai fichier MP3
    let _audioEl = null;

    function previewSingle(id) {
      const s = allSingles.find(x => x.id === id);
      if (!s) return;
      stopGlobal();

      if (!s.file_path) {
        FOZILA.toast('Extrait non disponible pour ce single', 'info');
        return;
      }

      document.getElementById('np-emoji').textContent = s.emoji;
      document.getElementById('np-title').textContent = s.title;
      document.getElementById('now-playing-banner').style.display = 'flex';
      document.getElementById('np-btn').textContent = '⏸';

      const _url = s.file_path.startsWith('http') ? s.file_path : window.location.origin + s.file_path;
      _audioEl = new Audio(_url);
      _audioEl.volume = 0.8;

      // Afficher durée réelle
      _audioEl.addEventListener('loadedmetadata', () => {
        const t = Math.floor(_audioEl.duration);
        document.getElementById('np-dur').textContent = Math.floor(t/60)+':'+String(t%60).padStart(2,'0');
      });
      _audioEl.play().catch(() => FOZILA.toast('Lecture impossible', 'error'));

      // Arrêter après 30 secondes (extrait)
      globalAudio = { start: Date.now(), duration: 30000 };
      animateBar();
      setTimeout(() => stopGlobal(), 30000);

      _audioEl.addEventListener('ended', stopGlobal);
    }

    function animateBar() {
      if (!globalAudio || !_audioEl) return;
      const elapsed = _audioEl.currentTime;
      const duration = _audioEl.duration || 30;
      const pct = Math.min(100, (elapsed / Math.min(duration, 30)) * 100);
      document.getElementById('np-fill').style.width = pct + '%';
      const sec = Math.floor(elapsed);
      document.getElementById('np-cur').textContent = Math.floor(sec/60)+':'+ String(sec%60).padStart(2,'0');
      animFrame = requestAnimationFrame(animateBar);
    }

    function toggleGlobalPlay() {
      if (!_audioEl) return;
      const btn = document.getElementById('np-btn');
      if (_audioEl.paused) {
        _audioEl.play(); btn.textContent = '⏸';
      } else {
        _audioEl.pause(); btn.textContent = '▶';
      }
    }

    function stopGlobal() {
      if (_audioEl) { _audioEl.pause(); _audioEl.currentTime = 0; _audioEl = null; }
      globalAudio = null;
      cancelAnimationFrame(animFrame);
      document.getElementById('now-playing-banner').style.display = 'none';
      document.getElementById('np-fill').style.width = '0%';
      document.getElementById('np-cur').textContent = '0:00';
    }

    function seekAudio(e, bar) {
      if (!_audioEl) return;
      const pct = e.offsetX / bar.offsetWidth;
      _audioEl.currentTime = pct * _audioEl.duration;
      document.getElementById('np-fill').style.width = (pct * 100) + '%';
    }

    // Achat single
    function openBuySingle(id) {
      const user = FOZILA.getUser();
      if (!user) { FOZILA.toast('Connectez-vous d\'abord', 'error'); setTimeout(()=>location.href='auth.html',1400); return; }
      currentSingleId = id;
      const s = allSingles.find(x => x.id === id);
      document.getElementById('bsm-name').textContent = s.title;
      document.getElementById('bsm-price').textContent = FOZILA.fmt(s.price);
      document.getElementById('buy-single-modal').classList.remove('hidden');
    }

    function selectPay(el) {
      document.querySelectorAll('.pay-method').forEach(m => m.classList.remove('selected'));
      el.classList.add('selected');
    }

    async function confirmSinglePayment() {
      const num    = document.getElementById('bsm-num').value.trim();
      const method = document.querySelector('.pay-method.selected')?.dataset.m || 'orange_money';
      if (!num) { FOZILA.toast('Entrez votre numéro', 'error'); return; }
      document.getElementById('buy-single-modal').classList.add('hidden');
      FOZILA.toast('⏳ Paiement en cours…', 'info');
      try {
        await FOZILA.purchase(currentSingleId, 'single', method, num);
        FOZILA.toast('✅ Single acheté ! Redirection vers Mon espace…', 'success');
        setTimeout(() => {
          location.href = 'dashboard.html?single=' + currentSingleId;
        }, 1500);
      } catch(err) {
        FOZILA.toast(err.message || 'Erreur de paiement', 'error');
      }
    }

    renderSingles().then(() => {
      const urlId = parseInt(new URLSearchParams(location.search).get('id'));
      if (urlId) setTimeout(() => openBuySingle(urlId), 500);
    });
  </script>
</body>
</html>
